<!DOCTYPE html>
<html lang="zh-CN" class="notranslate" translate="no">
<head>
  <meta charset="UTF-8">
  <title>价值链物理学</title>
  <meta name="google" content="notranslate">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  
  <style>
    :root {
      --theme-color: #d29922;
      --background: #06090e;
      --sidebar-background: #0d1117;
      --sidebar-border-color: rgba(48, 54, 61, 0.7);
      --text-color: #c9d1d9;
      --heading-color: #ffffff;
      --link-color: #58a6ff;
    }
    
    /* Force dark theme on all core wrappers to prevent white leaks */
    body, main, .content, .markdown-section, .sidebar {
      background-color: var(--background) !important;
      color: var(--text-color) !important;
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
    }
    
    body {
      background-color: var(--background) !important;
    }
    
    .content {
      background-color: var(--background) !important;
    }

    .sidebar {
      background-color: var(--sidebar-background) !important;
      border-right: 1px solid var(--sidebar-border-color) !important;
    }
    
    .sidebar-nav li a {
      color: #8b949e !important;
      font-size: 14px;
    }
    
    .sidebar-nav li.active > a {
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 2px solid var(--theme-color) !important;
    }
    
    .markdown-section {
      background-color: var(--background) !important;
      max-width: 900px !important;
      padding: 30px 45px 40px 45px !important;
    }
    
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 {
      color: var(--heading-color) !important;
      font-weight: 700;
    }
    
    .markdown-section h1 {
      border-bottom: 1px solid var(--sidebar-border-color);
      padding-bottom: 10px;
    }
    
    .markdown-section a {
      color: var(--link-color) !important;
      text-decoration: none;
    }
    
    .markdown-section a:hover {
      text-decoration: underline;
    }
    
    .markdown-section code {
      background-color: rgba(110, 118, 129, 0.2) !important;
      color: #ff7b72 !important;
      font-family: monospace;
      padding: 3px 6px !important;
      border-radius: 6px;
    }
    
    .markdown-section pre {
      background-color: rgba(22, 27, 34, 0.8) !important;
      border: 1px solid var(--sidebar-border-color) !important;
      border-radius: 8px;
    }
    
    .markdown-section pre code {
      color: #c9d1d9 !important;
      background: none !important;
      padding: 0 !important;
    }
    
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color) !important;
      background-color: rgba(210, 153, 34, 0.05) !important;
      color: #8b949e !important;
      border-radius: 0 8px 8px 0;
    }
    
    /* Tables styling */
    .table-container {
      width: 100%;
      overflow-x: auto;
      margin: 20px 0;
      border: 1px solid var(--sidebar-border-color);
      border-radius: 8px;
      background-color: rgba(22, 27, 34, 0.2);
    }
    
    .markdown-section table {
      border-collapse: collapse;
      width: 100% !important;
      margin: 0 !important;
      display: table !important;
      table-layout: auto;
    }
    
    .markdown-section th, .markdown-section td {
      border: 1px solid var(--sidebar-border-color) !important;
      padding: 12px;
      text-align: left;
      color: var(--text-color) !important;
      word-break: break-word;
      overflow-wrap: break-word;
      min-width: 120px;
    }
    
    .markdown-section th {
      background-color: rgba(22, 27, 34, 0.8) !important;
      color: white !important;
    }
    
    .markdown-section tr:nth-child(even) {
      background-color: rgba(22, 27, 34, 0.3) !important;
    }

    .markdown-section td:first-child, .markdown-section th:first-child {
      min-width: 50px !important;
      text-align: center;
    }

    
    /* Search Box Widget Styling */
    .search input {
      background-color: #0d1117 !important;
      border: 1px solid var(--sidebar-border-color) !important;
      color: var(--text-color) !important;
    }
    
    .search input:focus {
      border-color: var(--theme-color) !important;
      box-shadow: 0 0 10px rgba(210, 153, 34, 0.2) !important;
    }
    
    .search-results-panel {
      background-color: var(--background) !important;
    }
    
    .search em {
      background-color: rgba(210, 153, 34, 0.3) !important;
      color: #ffffff !important;
    }
  </style>
</head>
<body class="notranslate" translate="no">
  <div id="app" class="notranslate" translate="no">加载中...</div>
  <script>
    window.$docsify = {
      name: '价值链物理学',
      repo: 'GritMeng/Value-Chain-Physics',
      loadSidebar: true,     // 强行开启侧边栏
      auto2top: true,        // 路由切换时自动回到顶部
      maxLevel: 4,
      subMaxLevel: 3,
      requestHeaders: {      // 刚性破除浏览器一切历史死缓存
        'Cache-Control': 'no-cache',
        'Pragma': 'no-cache'
      },
      latex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$']]
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            // Transform [[path/to/file|display text]]
            content = content.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, function(match, path, text) {
              return '[' + text.trim() + '](' + path.trim() + '.md)';
            });
            
            // Transform [[path/to/file]]
            content = content.replace(/\[\[([^\]]+)\]\]/g, function(match, path) {
              if (path.startsWith('#')) {
                return '[' + path + '](' + path + ')';
              }
              // Extract filename
              var parts = path.split('/');
              var filename = parts[parts.length - 1];
              filename = filename.replace(/\.md$/, '');
              
              // Strip leading numbering (e.g. 01_ or 09a_)
              var cleanText = filename.replace(/^\d+[a-z]?_/, '');
              
              return '[' + cleanText.trim() + '](' + path.trim() + '.md)';
            });
            
            return content;
          });

          hook.afterEach(function(html) {
            // Wrap all <table> elements in a responsive container and force notranslate
            return html.replace(/<table>/g, '<div class="table-container notranslate" translate="no"><table>')
                       .replace(/<\/table>/g, '</table></div>');
          });

          hook.doneEach(function() {
            // Force notranslate on all elements that might contain math or code
            document.querySelectorAll('.katex, .katex-display, .katex-html, code, pre, .markdown-section pre, tex, script[type="math/tex"]').forEach(function(el) {
              el.classList.add('notranslate');
              el.setAttribute('translate', 'no');
            });
          });
        }
      ]
    }
  </script>
  
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- KaTeX (LaTeX engine) -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  
  <!-- docsify-latex 核心集成插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-latex@0"></script>
  
  <!-- Docsify 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

</body>
</html>
