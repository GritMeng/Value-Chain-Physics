  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: true
      },
      options: {
        // 允许 MathJax 强行扫描包含缩进的容器，全面降维接管列表坏块
        processHtmlClass: 'tex2jax_process',
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      },
      startup: {
        // 时序平锁：明确告知内核，我们要通过动态调用（Typeset）执行做功
        typeset: false
      }
    };
  </script>
  <script defer src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<body class="notranslate">

  <div id="app">系统正在执行高维相变，加载中...</div>

  <script>
    window.$docsify = {
      name: '价值链物理学',
      repo: 'GritMeng/Value-Chain-Physics',
      loadSidebar: false,   
      maxLevel: 3,          
      subMaxLevel: 3,       
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '输入关键词穿透物理体系...',
        noData: '未找到相关逻辑残差',
        depth: 4
      },
      // 【解药三】：构建动力学全息自愈闭环插件
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            // 每当 Docsify 抓取完数据、切换页面、或局部动态刷新时
            var runMathJax = function() {
              if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                // 利用 Promise 异步链，强制驱动 MathJax 对全页面的公式执行强制坍缩与无损显影
                MathJax.typesetPromise().then(function() {
                  // 物理拓扑闭环成功
                }).catch(function(err) {
                  console.log('MathJax 状态异常残差: ', err);
                });
              } else {
                // 如果 MathJax 还没加载完，挂起定时探针，延时 100ms 再次捕获，直至完全通电
                setTimeout(runMathJax, 100);
              }
            };
            runMathJax();
          });
        }
      ]
    }
  </script>
