<body class="notranslate" translate="no">

  <div id="app">系统正在执行高维相变，加载中...</div>

  <script>
    window.$docsify = {
      name: '价值链物理学',
      repo: 'GritMeng/Value-Chain-Physics',
      loadSidebar: false,   
      maxLevel: 3,          
      subMaxLevel: 3,       
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '输入关键词穿透物理体系...',
        noData: '未找到相关逻辑残差',
        depth: 4
      },
      plugins: [
        function(hook) {
          // 【时序反演】：在 Docsify 渲染完毕的最终环节，强行阻断一切外部插件的二次做功
          hook.doneEach(function() {
            var runMathJax = function() {
              if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                MathJax.typesetPromise().then(function() {
                  // 强制为所有生成出来的数学公式节点再次套上防翻译装甲，实施双重锁死
                  document.querySelectorAll('.MathJax').forEach(function(el) {
                    el.classList.add('notranslate');
                    el.setAttribute('translate', 'no');
                  });
                }).catch(function(err) {
                  console.log('时序异常: ', err);
                });
              } else {
                setTimeout(runMathJax, 50);
              }
            };
            runMathJax();
          });
        }
      ]
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
