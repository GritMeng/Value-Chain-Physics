<!DOCTYPE html>

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      }
    };
  </script>

<body>
  <div id="app">系统正在执行高维相变，加载中...</div>
  <script>
    window.$docsify = {
      name: '价值链物理学',
      repo: 'GritMeng/Value-Chain-Physics',
      loadSidebar: false,   // 保持自愈扫描，不依赖外部文件
      maxLevel: 3,          
      subMaxLevel: 3,       
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '输入关键词穿透物理体系...',
        noData: '未找到相关逻辑残差',
        depth: 4
      },
      // 每次页面切换或局部内容更新时，强制驱动中央机台对齐公式

        function(hook) {
          hook.doneEach(function() {
            if (typeof MathJax !== 'undefined' && MathJax.typeset) {
              MathJax.typeset();
            }
          });
        }
      ]
    }
  </script>
