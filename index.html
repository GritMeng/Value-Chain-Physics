<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>价值链物理学</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      }
    };
  </script>
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '价值链物理学',
      repo: 'GritMeng/Value-Chain-Physics',
      loadSidebar: true,     // 强行开启侧边栏
      auto2top: true,        // 路由切换时自动回到顶部
      maxLevel: 4,
      subMaxLevel: 3,
      requestHeaders: {      // 刚性破除浏览器一切历史死缓存
        'Cache-Control': 'no-cache',
        'Pragma': 'no-cache'
      },
      // 每一页渲染完成后，强制唤醒原生 MathJax 引擎执行全向扫描
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            if (typeof window.MathJax !== 'undefined' && window.MathJax.typeset) {
              window.MathJax.typeset();
            }
          });
        }
      ]
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
