<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全息抗熵：用价值链物理学统御制造网络 | IPC 电影级全息演示</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080b10;
            --card-bg: rgba(13, 17, 23, 0.7);
            --border-color: rgba(48, 54, 61, 0.6);
            --text-color: #c9d1d9;
            --primary-color: #58a6ff;
            --accent-color: #d29922;
            --glow-color: rgba(88, 166, 255, 0.35);
            --danger-color: #ff7b72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        }

        /* 宇宙暗底网格 */
        .space-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 30, 48, 0.4) 0%, rgba(8, 11, 16, 1) 100%),
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            z-index: 1;
        }

        /* 主舞台 */
        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        /* 顶部导航标题 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.8;
        }

        header .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary-color), #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(163, 113, 247, 0.3);
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        header .logo:hover {
            opacity: 0.85;
        }

        header .badge {
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid var(--primary-color);
            font-size: 12px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header .nav-btn-docs {
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(210, 153, 34, 0.15);
            border: 1px solid var(--accent-color);
            font-size: 12px;
            color: var(--accent-color);
            letter-spacing: 1px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        header .nav-btn-docs:hover {
            background: rgba(210, 153, 34, 0.3);
            box-shadow: 0 0 12px rgba(210, 153, 34, 0.4);
        }

        header .nav-btn-lectures {
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(88, 166, 255, 0.15);
            border: 1px solid var(--primary-color);
            font-size: 12px;
            color: var(--primary-color);
            letter-spacing: 1px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        header .nav-btn-lectures:hover {
            background: rgba(88, 166, 255, 0.3);
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.4);
        }

        header .nav-btn-audit {
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(163, 113, 247, 0.15);
            border: 1px solid #a371f7;
            font-size: 12px;
            color: #a371f7;
            letter-spacing: 1px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        header .nav-btn-audit:hover {
            background: rgba(163, 113, 247, 0.3);
            box-shadow: 0 0 12px rgba(163, 113, 247, 0.4);
        }

        /* 核心展示区 */
        .viewport {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 20px 0;
        }

        /* 各种动画容器 */
        .animation-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .animation-container.active {
            display: flex;
            opacity: 1;
        }

        /* Scene 1: Chaos Grid */
        #canvas-chaos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Scene 2: Operator Pi */
        #canvas-operator {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Scene 3: Console Code */
        .scene-flex-layout {
            display: flex;
            flex-direction: row;
            gap: 40px;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .console-box {
            flex: 1;
            max-width: 600px;
            height: 420px;
            background: rgba(10, 12, 16, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow-y: auto;
            text-align: left;
        }

        .dashboard-box {
            flex: 1;
            max-width: 600px;
            height: 420px;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .dashboard-title {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        #canvas-cpu {
            flex: 1;
            width: 100%;
            height: calc(100% - 40px);
            background: transparent;
        }

        .console-line {
            line-height: 1.5;
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(10px);
            animation: consoleFadeIn 0.3s forwards;
            font-size: 14px;
        }

        .console-prompt {
            color: #58a6ff;
        }

        .console-success {
            color: #3fb950;
            font-weight: bold;
        }

        .console-warning {
            color: #d29922;
        }

        @keyframes consoleFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scene 4: Obsidian Constellation */
        #canvas-obsidian {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 底部字幕面板 */
        .subtitle-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px 40px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .subtitle-text {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.6;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 0%, #a8b2c1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s ease;
        }

        .scene-indicator {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            border: 1px solid var(--border-color);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8b949e;
        }

        /* 控制浮层 - 开屏点火 */
        #launcher {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 11, 16, 0.95);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out;
        }

        #launcher.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-btn {
            background: linear-gradient(135deg, #1f6feb 0%, #8b5cf6 100%);
            border: none;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
            transition: all 0.3s ease;
            position: relative;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.9);
        }

        .play-btn svg {
            width: 40px;
            height: 40px;
            fill: white;
            margin-left: 6px;
        }

        .play-btn::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px dashed rgba(139, 92, 246, 0.4);
            animation: rotateDashed 20s linear infinite;
        }

        @keyframes rotateDashed {
            to { transform: rotate(360deg); }
        }

        .launcher-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            color: white;
            text-align: center;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #ffffff 0%, #8b949e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .launcher-desc {
            font-size: 14px;
            color: #8b949e;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
        }

        /* 录屏辅助提示 - 本地录屏时可手动去除 display:none */
        .record-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 123, 114, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 5;
            display: none; /* 对外发布时隐藏，本地录屏时改为 flex */
            align-items: center;
            gap: 8px;
            animation: flashRed 2s infinite;
        }

        @keyframes flashRed {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }

        /* 配乐提示板 - 对外发布时隐藏 */
        .audio-track-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 11px;
            color: #8b949e;
            z-index: 5;
            display: none; /* 对外发布时隐藏 */
            align-items: center;
            gap: 8px;
        }
        
        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 12px;
        }
        .eq-bar {
            width: 2px;
            background-color: var(--primary-color);
            animation: bounceBar 1s ease infinite alternate;
        }
        .eq-bar:nth-child(2) { animation-delay: 0.2s; }
        .eq-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounceBar {
            from { height: 2px; }
            to { height: 12px; }
        }

        /* 磨砂玻璃全息放映控制台 */
        .playback-console {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }
        
        .playback-console.hidden-console {
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }
        
        .console-btn-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .console-btn {
            background: rgba(22, 27, 34, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .console-btn:hover {
            background: rgba(88, 166, 255, 0.15);
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        .console-btn.active {
            background: rgba(88, 166, 255, 0.2);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .console-select {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .console-select:hover {
            border-color: var(--primary-color);
        }

        .console-divider {
            width: 1px;
            height: 20px;
            background: var(--border-color);
        }
        
        .playback-console .status-info {
            font-size: 11px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="space-grid"></div>

    <!-- 录屏提示与音轨 -->
    <div class="record-hint">
        <span style="display:inline-block; width:8px; height:8px; background:var(--danger-color); border-radius:50%;"></span>
        <span>提示: 可按下 [Win + G] 或使用 OBS 开启录屏与录音进行高保真视频保存</span>
    </div>
    <div class="audio-track-card">
        <div class="eq-bars">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
        <span id="bgm-indicator">配乐状态: 无源伴奏模式</span>
    </div>

    <!-- 启动点火遮罩 -->
    <div id="launcher">
        <button class="play-btn" id="start-btn" onclick="startShowcase()">
            <svg viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
            </svg>
        </button>
        <h1 class="launcher-title">全息抗熵：用价值链物理学统御制造网络</h1>
        <p class="launcher-desc">点击上方按钮，拉起 C++ DOD 大脑全息拓扑，启动电影级自动放映与语音讲述。请确保您的系统扬声器已开启。</p>
    </div>

    <!-- 悬浮播放控制台 -->
    <div id="playback-console" class="playback-console hidden-console">
        <div class="status-info">
            <span id="console-bgm-indicator">🔊 无源伴奏</span>
        </div>
        <div class="console-divider"></div>
        <div class="console-btn-group">
            <button class="console-btn" id="btn-prev-line" onclick="prevLineControl()" title="上一幕">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
            </button>
            <button class="console-btn" id="btn-play-pause" onclick="togglePlayPause()" title="暂停/播放">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <button class="console-btn" id="btn-next-line" onclick="nextLine()" title="下一幕">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
            </button>
        </div>
        <div class="console-divider"></div>
        <select id="scene-selector" class="console-select" onchange="jumpToScriptIndex(parseInt(this.value))">
            <!-- 动态填充 -->
        </select>
        <div class="console-divider"></div>
        <select id="speed-selector" class="console-select" onchange="changeSpeed(this.value)" title="播放语速">
            <option value="0.8">0.8x 语速</option>
            <option value="1.0" selected>1.0x 语速</option>
            <option value="1.2">1.2x 语速</option>
            <option value="1.5">1.5x 语速</option>
        </select>
    </div>

    <div id="stage">
        <!-- 头部 -->
        <header>
            <div class="logo" onclick="window.location.href='showcase.html'">IPC DEEPMIND ENGINE</div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="badge" id="scene-badge">Scene 01: Chaos</div>
                <button class="nav-btn-docs" onclick="window.location.href='index.html'">📖 系统科学文档</button>
                <button class="nav-btn-lectures" onclick="window.location.href='IPC_Video_Lectures.html'">🎓 全息视频讲堂</button>
                <button class="nav-btn-audit" onclick="window.location.href='value_chain_audit_agent.html'">🔮 智能审计体</button>
            </div>
        </header>

        <!-- 视觉展示区 -->
        <div class="viewport">
            <!-- 场景 1：无序熵增 -->
            <div class="animation-container active" id="scene-1">
                <canvas id="canvas-chaos"></canvas>
            </div>

            <!-- 场景 2：Pi算符重整 -->
            <div class="animation-container" id="scene-2">
                <canvas id="canvas-operator"></canvas>
            </div>

            <!-- 场景 3：C++ 裸金属压测 -->
            <div class="animation-container scene-flex-layout" id="scene-3">
                <div class="console-box" id="console-output"></div>
                <div class="dashboard-box">
                    <div class="dashboard-title">DOD CACHE SENSITIVE FLUID THREAD SIMULATION</div>
                    <canvas id="canvas-cpu"></canvas>
                </div>
            </div>

            <!-- 场景 4：Obsidian 星云 -->
            <div class="animation-container" id="scene-4">
                <canvas id="canvas-obsidian"></canvas>
            </div>
        </div>

        <!-- 字幕栏 -->
        <div class="subtitle-panel">
            <div class="scene-indicator" id="indicator-text">Thermodynamic Core</div>
            <div class="subtitle-text" id="subtitle-content">点火就绪，等待统御指令...</div>
        </div>
    </div>

    <script>
        // 脚本数据定义：旁白与场景绑定
        const videoScript = [
            // 第一幕：混沌的重力与低维布朗运动 (0s - 40s)
            {
                scene: 1,
                badge: "Scene 01: Chaos Grid",
                indicator: "Thermodynamic Core",
                text: "无论宇宙的终局是热寂还是坍缩，热力学第二定律已为一切存在设定了无可规避的物理重力——万物皆向混乱与无序滑落。"
            },
            {
                scene: 1,
                badge: "Scene 01: Chaos Grid",
                indicator: "Complexity Trap",
                text: "在由成百上千个供应商、机台与 SKU 交织的价值链网络中，当协同节点为 N 时，系统的复杂度将呈 N 的平方指数级爆发。"
            },
            {
                scene: 1,
                badge: "Scene 01: Chaos Grid",
                indicator: "Axiom of Variety",
                text: "人脑工作记忆 7 加减 2 的生理极限，注定了我们无法在同一个大脑中，实时求解出兼顾全局交付与利润的‘全局最优解’。"
            },
            {
                scene: 1,
                badge: "Scene 01: Chaos Grid",
                indicator: "Babel Tower",
                text: "我们在用机械时代的‘人治沟通’，去承载指数级变化的商业网络。局部理性的盲目博弈，在物理上化作了系统性内耗的摩擦废热：激增的呆滞料、高频的停工待料与迟滞的决策。"
            },
            {
                scene: 1,
                badge: "Scene 01: Chaos Grid",
                indicator: "Whitney Failure",
                text: "低维的工具，终究会在高维的拓扑面前发生惨烈的模型失效。"
            },

            // 第二幕：系统物理学宪法与硅基代偿 (40s - 75s)
            {
                scene: 2,
                badge: "Scene 02: Operator Pi",
                indicator: "Governance Operator",
                text: "逃离阶乘级黑洞的唯一通道，是硅基的拓扑降维。我们必须在数字宇宙中，完成一场彻底的商业本体论跃迁。"
            },
            {
                scene: 2,
                badge: "Scene 02: Operator Pi",
                indicator: "Axiomatic Base",
                text: "引入‘统御算符’，向系统源源不断注入负熵，重写微观定律。"
            },
            {
                scene: 2,

                ctxObsidian.lineWidth = 3.5;
                ctxObsidian.beginPath();
                for (let x = 0; x < canvasObsidian.width; x += 10) {
                    let y = canvasObsidian.height - 50 + Math.sin(x * 0.015) * 6;
                    if (x === 0) ctxObsidian.moveTo(x, y);
                    else ctxObsidian.lineTo(x, y);
                }
                ctxObsidian.stroke();
                
                ctxObsidian.fillStyle = '#3fb950';
                ctxObsidian.font = 'bold 22px Outfit';
                ctxObsidian.textAlign = 'center';
                ctxObsidian.fillText("全息抗熵，星火燎原。", cx, canvasObsidian.height - 85);
            }
            
            requestAnimationFrame(animateObsidian);
        }

        // ==========================================
        // 核心放映控制逻辑
        // ==========================================
        function startShowcase() {
            document.getElementById("launcher").classList.add("hidden");
            document.getElementById("playback-console").classList.remove("hidden-console");
            isPlaying = true;
            currentScriptIndex = 0;
            
            // 动态填充控制台场景选择下拉菜单
            const selector = document.getElementById("scene-selector");
            if (selector && selector.options.length === 0) {
                videoScript.forEach((item, idx) => {
                    const opt = document.createElement("option");
                    opt.value = idx;
                    opt.textContent = `${(idx+1).toString().padStart(2, '0')}: ${item.badge} (${item.indicator})`;
                    selector.appendChild(opt);
                });
            }
            if (selector) selector.value = 0;
            
            playNextLine();
        }

        // 播放与暂停切换
        function togglePlayPause() {
            const btn = document.getElementById("btn-play-pause");
            if (isPlaying) {
                isPlaying = false;
                if (btn) {
                    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`;
                    btn.classList.remove("active");
                }
                if (currentUtterance) synthesis.cancel();
                if (currentAudio) currentAudio.pause();
                clearTimeout(watchdogTimer);
                clearTimeout(playTimer);
            } else {
                isPlaying = true;
                if (btn) {
                    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
                    btn.classList.add("active");
                }
                playNextLine();
            }
        }

        // 切换到特定剧本行
        function jumpToScriptIndex(index) {
            if (index < 0 || index >= videoScript.length) return;
            if (currentUtterance) synthesis.cancel();
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            clearTimeout(watchdogTimer);
            clearTimeout(playTimer);
            
            currentScriptIndex = index;
            
            // 同步下拉框状态
            const selector = document.getElementById("scene-selector");
            if (selector) selector.value = currentScriptIndex;
            
            const current = videoScript[currentScriptIndex];
            document.getElementById("scene-badge").innerText = current.badge;
            document.getElementById("indicator-text").innerText = current.indicator;
            document.getElementById("subtitle-content").innerText = current.text;
            switchScene(current.scene);
            
            if (isPlaying) {
                playNextLine(true); // jump mode
            }
        }

        // 下一幕
        function nextLine() {
            if (currentScriptIndex < videoScript.length - 1) {
                jumpToScriptIndex(currentScriptIndex + 1);
            }
        }

        // 上一幕
        function prevLineControl() {
            if (currentScriptIndex > 0) {
                jumpToScriptIndex(currentScriptIndex - 1);
            }
        }

        // 改变语速
        function changeSpeed(rate) {
            speechRate = parseFloat(rate);
            if (isPlaying) {
                jumpToScriptIndex(currentScriptIndex);
            }
        }

        function playNextLine(jumpMode = false) {
            if (!isPlaying) return;
            if (currentScriptIndex >= videoScript.length) {
                document.getElementById("subtitle-content").innerText = "🎬 全息抗熵统御演示放映完毕。";
                isPlaying = false;
                document.getElementById("launcher").classList.remove("hidden");
                document.getElementById("playback-console").classList.add("hidden-console");
                return;
            }
            
            const current = videoScript[currentScriptIndex];
            document.getElementById("scene-badge").innerText = current.badge;
            document.getElementById("indicator-text").innerText = current.indicator;
            document.getElementById("subtitle-content").innerText = current.text;
            switchScene(current.scene);
            
            // 更新下拉选框
            const selector = document.getElementById("scene-selector");
            if (selector) selector.value = currentScriptIndex;

            if (currentUtterance) synthesis.cancel();
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            let lineFinished = false;
            const estimatedDuration = Math.max(4000, current.text.length * 300 / speechRate + 2000); 
            
            watchdogTimer = setTimeout(() => {
                console.warn("演示看门狗触发：播放超时或挂起，强制进入下一幕。");
                advance();
            }, estimatedDuration);
            
            function advance() {
                if (lineFinished) return;
                lineFinished = true;
                clearTimeout(watchdogTimer);
                if (currentUtterance) synthesis.cancel();
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                playTimer = setTimeout(() => {
                    currentScriptIndex++;
                    playNextLine();
                }, 1000);
            }
            
            const audioPath = `audio/grits_voice_${currentScriptIndex + 1}.mp3`;
            const audio = new Audio(audioPath);
            currentAudio = audio;
            let fallbackExecuted = false;
            
            function executeTTSFallback() {
                if (fallbackExecuted || lineFinished) return;
                fallbackExecuted = true;
                
                const statusLbl = "配乐状态: 无源伴奏 (合成语音播报)";
                document.getElementById("bgm-indicator").innerText = statusLbl;
                document.getElementById("console-bgm-indicator").innerText = "🔊 " + statusLbl;
                
                currentUtterance = new SpeechSynthesisUtterance(current.text);
                currentUtterance.lang = "zh-CN";
                currentUtterance.rate = 0.95 * speechRate; 
                currentUtterance.pitch = 0.85;

                currentUtterance.onend = advance;
                currentUtterance.onerror = advance;

                synthesis.speak(currentUtterance);
            }

            audio.addEventListener('canplaythrough', () => {
                if (fallbackExecuted || lineFinished) return; 
                const statusLbl = `配乐状态: 原声模式 (grits_voice_${currentScriptIndex + 1}.mp3)`;
                document.getElementById("bgm-indicator").innerText = statusLbl;
                document.getElementById("console-bgm-indicator").innerText = "🔊 " + statusLbl;
                
                // Adjust audio rate if supported
                try {
                    audio.defaultPlaybackRate = speechRate;
                    audio.playbackRate = speechRate;
                } catch(e) {}
                
                audio.play().catch(err => {
                    console.warn("播放本地音频失败，降级为合成语音:", err);
                    executeTTSFallback();
                });
            });

            audio.addEventListener('ended', advance);

            audio.addEventListener('error', (err) => {
                executeTTSFallback();
            });

            setTimeout(() => {
                if (!fallbackExecuted && !lineFinished && audio.readyState < 3) {
                    executeTTSFallback();
                }
            }, 2000);
        }

        function switchScene(sceneNum) {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`scene-${i}`).classList.remove("active");
            }
            document.getElementById(`scene-${sceneNum}`).classList.add("active");
            resizeCanvas();

            if (sceneNum === 1) {
                initChaos();
                animateChaos();
            } else if (sceneNum === 2) {
                initOperator();
                animateOperator();
            } else if (sceneNum === 3) {
                initCPU();
                animateCPU();
                startConsoleSimulation();
            } else if (sceneNum === 4) {
                initObsidian();
                animateObsidian();
            }
        }
    </script>
</body>
</html>
