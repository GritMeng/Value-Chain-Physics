<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>映与界的奏鸣曲 - 视频播放录制器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Noto+Serif+SC:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #ffffff;
            font-family: 'Outfit', 'Noto Serif SC', 'PingFang SC', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 视频容器 */
        #video-container {
            position: relative;
            background-color: #050505;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        /* 16:9 横屏尺寸 */
        .mode-horizontal {
            width: 1280px;
            height: 720px;
            border: 2px solid #222;
        }

        /* 9:16 竖屏尺寸 */
        .mode-vertical {
            width: 405px;
            height: 720px;
            border: 2px solid #222;
        }

        /* 录制状态（无边框，干净） */
        .recording-mode {
            border: none !important;
            box-shadow: none !important;
        }

        /* 动画画布 */
        #animation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 覆盖层 - 字幕与公式 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            padding: 40px;
        }

        /* 顶部公式与标题 */
        #top-meta {
            text-align: center;
            opacity: 0.9;
            transition: all 0.5s ease;
        }
        
        #top-meta h2 {
            font-size: 16px;
            letter-spacing: 4px;
            color: #00F0FF;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            margin-bottom: 8px;
            font-weight: 300;
        }

        .mode-vertical #top-meta h2 {
            font-size: 12px;
            letter-spacing: 2px;
        }

        #formula-display {
            font-family: 'Outfit', monospace;
            font-size: 24px;
            color: #FF5E00;
            text-shadow: 0 0 15px rgba(255, 94, 0, 0.6);
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            transition: all 0.5s ease;
        }

        .mode-vertical #formula-display {
            font-size: 18px;
        }

        /* 中部视觉特效容器 */
        #mid-visuals {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 底部字幕 */
        #subtitle-box {
            text-align: center;
            width: 100%;
            max-width: 90%;
            margin: 0 auto;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .mode-vertical #subtitle-box {
            max-width: 95%;
            min-height: 120px;
        }

        #subtitle-text {
            font-size: 24px;
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.3);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .mode-vertical #subtitle-text {
            font-size: 18px;
            line-height: 1.5;
        }

        #subtitle-subtext {
            font-size: 14px;
            color: #888;
            margin-top: 6px;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }

        /* 控制面板 */
        #control-panel {
            position: fixed;
            bottom: 20px;
            z-index: 10;
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            width: 900px;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #control-panel.hidden {
            opacity: 0;
            transform: translateY(50px);
            pointer-events: none;
        }

        .btn {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            border-color: #00F0FF;
            color: #00F0FF;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
        }

        .btn-active {
            background: #FF5E00 !important;
            border-color: #FF5E00 !important;
            color: #fff !important;
        }

        .btn-active:hover {
            box-shadow: 0 0 12px rgba(255, 94, 0, 0.4) !important;
        }

        /* 进度条 */
        #timeline-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        #timeline-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #222;
            outline: none;
            cursor: pointer;
        }

        #timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00F0FF;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0,240,255,0.8);
            transition: transform 0.1s ease;
        }

        #timeline-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        /* 列表侧栏 */
        #playlist-panel {
            position: fixed;
            right: 20px;
            top: 20px;
            bottom: 120px;
            width: 320px;
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            z-index: 10;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #playlist-panel.hidden {
            opacity: 0;
            transform: translateX(50px);
            pointer-events: none;
        }

        #playlist-panel h3 {
            font-size: 16px;
            color: #00F0FF;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            letter-spacing: 1px;
        }

        .playlist-item {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .playlist-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: #444;
        }

        .playlist-item.active {
            background: rgba(0, 240, 255, 0.1);
            border-color: #00F0FF;
            color: #00F0FF;
        }

        .playlist-item-num {
            font-family: monospace;
            opacity: 0.5;
            margin-right: 8px;
        }

        /* 提示层 */
        #record-alert {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 94, 0, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
        }

        /* 动态背景星空 */
        #starfield {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- 星空背景线框 -->
    <canvas id="starfield"></canvas>

    <div id="record-alert">正在录制模式：按【ESC】退出，按【空格】暂停</div>

    <!-- 视频画幅容器 -->
    <div id="video-container" class="mode-horizontal">
        <canvas id="animation-canvas"></canvas>
        
        <div id="overlay">
            <!-- 顶部标题和公式 -->
            <div id="top-meta">
                <h2 id="scene-title">映与界的奏鸣曲</h2>
                <div id="formula-display">dS &ge; 0</div>
            </div>

            <!-- 中部动态视觉占位 -->
            <div id="mid-visuals"></div>

            <!-- 底部字幕 -->
            <div id="subtitle-box">
                <div id="subtitle-text">宇宙在注定的洪流中走向混乱。</div>
                <div id="subtitle-subtext">Scene 1 / 18</div>
            </div>
        </div>
    </div>

    <!-- 控制面板 -->
    <div id="control-panel">
        <div style="display: flex; gap: 10px;">
            <button class="btn" id="btn-play">▶ 播放</button>
            <button class="btn" id="btn-prev">⏮ 上一幕</button>
            <button class="btn" id="btn-next">⏭ 下一幕</button>
        </div>

        <div id="timeline-container">
            <span id="time-current" style="font-size: 12px; font-family: monospace;">00:00</span>
            <input type="range" id="timeline-slider" min="0" max="100" value="0">
            <span id="time-duration" style="font-size: 12px; font-family: monospace;">00:00</span>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="btn" id="btn-layout">📱 切换竖屏</button>
            <button class="btn btn-active" id="btn-record">🔴 录制模式</button>
            <button class="btn" id="btn-playlist">📋 播放列表</button>
        </div>
    </div>

    <!-- 播放列表侧边栏 -->
    <div id="playlist-panel">
        <h3>各幕播放列表</h3>
        <div id="playlist-items"></div>
    </div>

    <script>
        // 场景数据结构定义
        const SCENES = [
            {
                id: 1,
                title: "第一幕：冷酷的热寂重力",
                formula: "dS \\ge 0",
                audio: "audio_sonata/sonata_voice_1.mp3",
                text: "宇宙在注定的洪流中走向混乱。热力学第二定律为一切存在设定了无可规避的物理重力——万物皆无可挽回地向高熵与无序滑落。它像一条单向流逝的冷酷河流，无情地冲向概率均等、毫无生机、彻底对称的虚空。在那个终点，温差熄灭，能量死寂。如果用今天的计算机语言来描述，那将是宇宙的终极“死机”。",
                animation: "entropy"
            },
            {
                id: 2,
                title: "第一幕：开放复杂巨系统",
                formula: "OCGS",
                audio: "audio_sonata/sonata_voice_2.mp3",
                text: "正如中国系统科学泰斗钱学森先生所洞察的：宇宙的最高演化挑战，在于那些与外部环境不断交换物质、能量与信息的“开放复杂巨系统”。这类系统由千亿异构节点非线性耦合而成，在自发状态下，唯有秩序的衰减与结构的退化。",
                animation: "ocgs"
            },
            {
                id: 3,
                title: "第一幕：反叛者的诞生",
                formula: "S_{neg} = k \\ln \\Omega",
                audio: "audio_sonata/sonata_voice_3.mp3",
                text: "然而，在这场走向平衡的冰冷洪流中，却诞生了生命与智能。它们像是不屈的反叛者，在注定的无序中倔强地逆流而上，建立起一片又一片秩序的绿洲。生命以负熵为食，智能以有序为生。智能的本质究竟是什么？答案，就藏在系统物理学与数学逻辑的终点：世界，就是视界。",
                animation: "rebels"
            },
            {
                id: 4,
                title: "第二幕：世者视也，映射之网",
                formula: "Mapping: X \\to Y",
                audio: "audio_sonata/sonata_voice_4.mp3",
                text: "世，即是“视”。在信息论的意义上，智能体无法直接触碰客观宇宙的本体。我们眼前的颜色、耳边的声音、脑海中的物理公式，全部是外部宇宙高维混沌在智能体内部的低维投影。没有在底层施加物理极值约束、锁定数据正交基底，观测便没有锚点。统御，是观测具备物理合法性的绝对前置条件。",
                animation: "mapping"
            },
            {
                id: 5,
                title: "第二幕：界者限也，秩序之墙",
                formula: "Markov Blanket",
                audio: "audio_sonata/sonata_voice_5.mp3",
                text: "界，即是“限”。在系统科学中，这面墙被称为“马尔可夫毯”。它是系统划分“自我”与“外界”的绝对屏障，更是系统可以施加秩序的物理极限。系统永远被限制在视界的内侧，只能通过视界上的信息流动与状态涨落，来构建它对宇宙的理解。所谓“世界”，不过是智能体“视野的界限”——即“视界”。视界有多大，世界就有多大。",
                animation: "blanket"
            },
            {
                id: 6,
                title: "第二幕：阶乘级复杂度爆发",
                formula: "V_s \\approx O(N!)",
                audio: "audio_sonata/sonata_voice_6.mp3",
                text: "在一个节点高度纠缠、变异路径呈阶乘级爆炸的复杂巨系统中，系统的数学复杂度呈阶乘级爆发。然而，作为观察者和设计者的人类大脑，其神经元突触的放电频率和工作记忆容量受限于生化极限，被严格约束在七加减二的狭小带宽内。这便构成了系统科学最残酷的物理鸿沟。",
                animation: "carbon_limit"
            },
            {
                id: 7,
                title: "第二幕：人机协同的必然",
                formula: "C_{carbon} \\ll O(N!)",
                audio: "audio_sonata/sonata_voice_7.mp3",
                text: "根据必要多样性定律，控制系统的有效带宽不得低于被控系统的复杂度。当碳基控制带宽远小于客体变异状态时，控制效力将因严重倒挂而归零。因此，人机协同不是一种技术时尚，而是智能在物理学规律逼迫下的必然进化：碳基负责立法定向，以元认知提炼第一性原理，注入全局意志；硅基负责代偿算力，在有界时空中接管阶乘级复杂度的并发推演与降维做功。",
                animation: "synergy"
            },
            {
                id: 8,
                title: "第三幕：五维正交建模",
                formula: "\\Pi = \\langle D, A \\rangle",
                audio: "audio_sonata/sonata_voice_8.mp3",
                text: "要在混沌中建立秩序，智能体必须在内部构建一个与外部世界同构的镜子。这个模型，必须在拓扑上保留被映射系统的五个不变量：节点，拓扑，约束，状态跃迁，以及状态矢量。遗漏任何一维，映射即发生代数层面的信息丢失，系统即丧失对客体的有效控制。",
                animation: "five_dims"
            },
            {
                id: 9,
                title: "第三幕：计算不可约的代数截断",
                formula: "f_{compute} > f_{perturbation}",
                audio: "audio_sonata/sonata_voice_9.mp3",
                text: "但这套形式系统天然面临一道致命天堑：计算不可约性。非线性巨系统的未来无法被解析公式抄捷径，只能一步一步模拟。唯一的解，是在承认“步进推演不可绕过”的前提下，把每一步算到极致：利用物理约束在推演极早期执行代数截断，将指数级搜索空间强行收缩为可计算域，使计算速度超越现实世界的扰动频率。",
                animation: "truncation"
            },
            {
                id: 10,
                title: "第三幕：全息抗熵大一统",
                formula: "V_\\Omega(t+1) = M \\cdot \\Pi [ \\Sigma(m_i \\cdot \\pi_i \\cdot S_i) + \\Delta(t) ]",
                audio: "audio_sonata/sonata_voice_10.mp3",
                text: "这种映射在数学上收敛为全息抗熵大一统方程。在机器的执行层，它通过三大物理相态的协同实现可计算：全息观测执行客观确权；动态模拟在算力空间中进行超前推演与代数截断；降维治理剥离微观节点的无效自由度，将宏观协同收敛至意志吸引子，同时释放微观子系统在自身轨道内的专业奋进自由。",
                animation: "grand_equation"
            },
            {
                id: 11,
                title: "第四幕：计算的宿命",
                formula: "Rice's Theorem",
                audio: "audio_sonata/sonata_voice_11.mp3",
                text: "但当人类试图用计算机去统治这个世界时，我们撞上了一堵无形的逻辑高墙。目前的硅基人工智能，其本质是“单支驱动”的形式逻辑系统。然而，图灵和哥德尔早已为这种单驱系统判了死刑。更致命的是，莱斯定理将这场判决推广到了极致：任何有意义的非平凡程序属性在图灵机上皆不存在通用判定算法。",
                animation: "undecidable"
            },
            {
                id: 12,
                title: "第四幕：停机视界",
                formula: "Halting Horizon",
                audio: "audio_sonata/sonata_voice_12.mp3",
                text: "哥德尔划定了逻辑的边界；图灵划定了计算的边界；莱斯划定了语义的边界。这三者构成一道绝对的不可判定三角。这意味着，任何智能排产算法，在底层逻辑上都无法被先验地证明永远不产生库存积压。一旦形式系统到达了它的停机视界，它就再也看不见视界外的真理，最终只能陷入崩溃、死锁或无休止的“机器致幻”。",
                animation: "halting_triangle"
            },
            {
                id: 13,
                title: "第四幕：残差与因果诊断",
                formula: "\\Delta(t) = |Model - Real|",
                audio: "audio_sonata/sonata_voice_13.mp3",
                text: "而在闭环的终点——反馈，智能体通过因果对比计算出预测残差。在此节点，智能体将面临两种完全不同的差错诊断：第一，当外部物理世界没有执行，模型本身没有错，智能体必须主动推动，强行让物理实相服从模型意图；第二，当模型本身错误，智能体必须停止偏执，调整模型，更新对客观规律的认知。",
                animation: "diagnostics"
            },
            {
                id: 14,
                title: "第五幕：双支驱动的宇宙交响",
                formula: "\\Phi_{\\Lambda}(\\Pi, \\Delta_{critical})",
                audio: "audio_sonata/sonata_voice_14.mp3",
                text: "为了打破形式逻辑的死锁，宇宙演化出了一种更伟大的结构——双支驱动智能系统。第一支驱动是形式重整，在已知的公理边界内运行高频闭环算法，追求极致的局部效率；第二支驱动是公理注入，当第一支驱动在逻辑视界边缘陷入死锁时，意识与直觉开始工作，不需要逻辑推导，而是直接从视界之外抓取新的公理，强行注入系统，打破停机死锁，重新定义世界。",
                animation: "dual_drives"
            },
            {
                id: 15,
                title: "第五幕：五维认知操作系统",
                formula: "Conscience \\to Metacognition",
                audio: "audio_sonata/sonata_voice_15.mp3",
                text: "这正是碳基必须介入的数学根源：硅基算符在边界内执行确定性做功，但边界的识别、跨越与重构，必须由碳基元认知在哥德尔、图灵、莱斯的联合盲区中完成非确定性跃迁。第二支驱动的“公理抓取”，在认知控制论的最底层，坍缩为一台精密的良知驱动五维神经操作系统：良知锚定方向，高敏感捕获残差，极度感性驱动寻优，流体智力推演路径，元认知执行跃迁。",
                animation: "brain_os"
            },
            {
                id: 16,
                title: "第五幕：先哲智慧的投影",

        // 全局播放控制器状态

        // 初始化画布大小

        // 渲染星空背景
        const starfieldCanvas = document.getElementById('starfield');
        const sCtx = starfieldCanvas.getContext('2d');
        let stars = [];
        function initStarfield() {
            starfieldCanvas.width = window.innerWidth;
            starfieldCanvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * starfieldCanvas.width,
                    y: Math.random() * starfieldCanvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: 0.05 + Math.random() * 0.05
                });
            }
        }
        function drawStarfield() {
            sCtx.fillStyle = '#030303';
            sCtx.fillRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
            sCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            stars.forEach(star => {
                sCtx.beginPath();
                sCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                sCtx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                sCtx.fill();
                star.opacity += star.speed;
                if (star.opacity > 1 || star.opacity < 0.1) {
                    star.speed = -star.speed;
                }
            });
            requestAnimationFrame(drawStarfield);

        // 加载场景

            sceneTitle.innerText = scene.title;

        // 字幕分段辅助算法（以逗号，句号等分割，分时间渲染，防止长文本堆积）
        let subtitleChunks = [];
        function updateSubtitleChunks(text) {
            // 将中文根据标点拆分
            subtitleChunks = text.split(/([，。；？！、“”])/g).filter(Boolean);
            // 拼接标点符号
            let combined = [];
            for (let i = 0; i < subtitleChunks.length; i++) {
                if (i % 2 === 0) {
                    combined.push(subtitleChunks[i] + (subtitleChunks[i+1] || ''));
                }
            }
            subtitleChunks = combined.map(str => str.trim()).filter(Boolean);
            
            // 预显示第一部分
            if (subtitleChunks.length > 0) {
                subtitleText.innerHTML = subtitleChunks[0];
            } else {
                subtitleText.innerHTML = text;
            }
        }

        function onAudioTimeUpdate() {
            const time = activeAudio.currentTime;
            const duration = activeAudio.duration || 1;
            timeCurrent.innerText = formatTime(time);
            timelineSlider.value = Math.floor(time);

            // 同步字幕分段切换
            if (subtitleChunks.length > 1) {
                const chunkIndex = Math.min(
                    Math.floor((time / duration) * subtitleChunks.length),
                    subtitleChunks.length - 1
                );
                if (subtitleText.innerHTML !== subtitleChunks[chunkIndex]) {
                    subtitleText.style.opacity = 0;
                    setTimeout(() => {
                        subtitleText.innerHTML = subtitleChunks[chunkIndex];
                        subtitleText.style.opacity = 1;
                    }, 100);
                }
            }
        }

        function onAudioEnded() {
            if (currentSceneIndex < SCENES.length - 1) {
                // 自动播放下一幕
                loadScene(currentSceneIndex + 1);
            } else {
                // 播放结束
                isPlaying = false;
                playBtn.innerText = "▶ 播放";
                activeAudio.currentTime = 0;
            }
        }

        function togglePlay() {
            if (isPlaying) {
                activeAudio.pause();
                isPlaying = false;
                playBtn.innerText = "▶ 播放";
            } else {
                activeAudio.play().catch(err => alert("请先确保本地音频资源已生成在 audio_sonata/ 目录中！"));
                isPlaying = true;
                playBtn.innerText = "⏸ 暂停";
            }
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // ==========================================
        // 动态物理与数学 2D 画布动画引擎 (Dynamic Canvas Animation Engine)

        let animationState = {
            type: 'entropy',

        function resetAnimationEngine(type) {
            animationState.type = type;

                for (let i = 0; i < 8; i++) {
                    // 正方体顶点 3D 坐标

                    const y3d = (i & 2 ? 1 : -1) * 80;
                    const z3d = (i & 4 ? 1 : -1) * 80;
                    animationState.particles.push({ x3d, y3d, z3d });
                }
            } else if (type === 'blanket') {
                // 马尔可夫毯秩序之墙
                // 内部粒子
                for (let i = 0; i < 15; i++) {
                    animationState.particles.push({
                        x: cx + (Math.random() - 0.5) * 80,
                        y: cy + (Math.random() - 0.5) * 80,
                        vx: (Math.random() - 0.5) * 0.5,

                // 外部混沌冲击粒子
                for (let i = 0; i < 40; i++) {
                    animationState.particles.push({
                        x: Math.random() > 0.5 ? Math.random() * 50 : w - Math.random() * 50,
                        y: Math.random() * h,
                        vx: (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random() * 2),
                        vy: (Math.random() - 0.5) * 2,

                    });

            } else if (type === 'carbon_limit') {
                // 碳基极限过载系统
                for (let i = 0; i < 15; i++) {
                    animationState.particles.push({
                        x: cx + Math.cos(i * (Math.PI * 2 / 15)) * 100,
                        y: cy + Math.sin(i * (Math.PI * 2 / 15)) * 100,
                        size: 4,
                        pulse: Math.random() * Math.PI
                    });
                }
            } else if (type === 'synergy') {
                // 双脑协同 (碳 + 硅)
                animationState.particles.push({ name: 'carbon', x: cx - 120, y: cy, color: '#FF5E00', radius: 40 });
                animationState.particles.push({ name: 'silicon', x: cx + 120, y: cy, color: '#00F0FF', radius: 45 });
            } else if (type === 'five_dims') {
                // 五维正交拓扑
                const labels = ["节点", "拓扑", "约束", "状态跃迁", "状态矢量"];
                for (let i = 0; i < 5; i++) {
                    const angle = i * (Math.PI * 2 / 5) - Math.PI / 2;
                    animationState.particles.push({
                        x: cx + Math.cos(angle) * 120,
                        y: cy + Math.sin(angle) * 120,
                        label: labels[i],
                        angle: angle
                    });
                }
            } else if (type === 'truncation') {
                // 指数爆炸分支拓扑
                // 生成多级分裂树
                buildFractalTree(cx, cy + 100, -Math.PI / 2, 70, 5);
            } else if (type === 'grand_equation') {
                // 全息抗熵方程发光流动矩阵
                animationState.matrixChars = [];
                for (let i = 0; i < 25; i++) {
                    animationState.matrixChars.push({

                        y: Math.random() * h,

                        alpha: 0.1 + Math.random() * 0.4
                    });
                }
            } else if (type === 'undecidable') {
                // 逻辑三角与程序流
                animationState.particles.push({ x: cx, y: cy - 90, name: 'Gödel' });
                animationState.particles.push({ x: cx - 100, y: cy + 70, name: 'Turing' });
                animationState.particles.push({ x: cx + 100, y: cy + 70, name: 'Rice' });
            } else if (type === 'halting_triangle') {
                // 停机视界死锁坍缩
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 80 + Math.random() * 100;
                    animationState.particles.push({
                        x: cx + Math.cos(angle) * r,
                        y: cy + Math.sin(angle) * r,
                        vx: 0,
                        vy: 0,
                        targetR: 50,
                        r: r,
                        angle: angle
                    });

            } else if (type === 'diagnostics') {
                // 残差诊断曲线
                for (let i = 0; i < w; i += 5) {
                    animationState.particles.push({ x: i, y: 0 });

            } else if (type === 'dual_drives') {

                animationState.particles.push({ x: cx - 70, y: cy, r: 60, speed: 0.015, color: '#00F0FF' });
                animationState.particles.push({ x: cx + 70, y: cy, r: 50, speed: -0.018, color: '#FF5E00' });
            } else if (type === 'brain_os') {

                    });

            } else if (type === 'philosophers') {
                // 阴阳与谐波
                for (let i = 0; i < 40; i++) {
                    animationState.particles.push({ x: i * (w / 40), y: cy });
                }
            } else if (type === 'maxwell_demon') {
                // 麦克斯韦小妖门阀
                animationState.particles.push({ x: cx, y: cy, r: 15 }); // 妖精核心
                for (let i = 0; i < 30; i++) {
                    animationState.particles.push({
                        x: Math.random() > 0.5 ? cx - 120 : cx + 120,
                        y: cy + (Math.random() - 0.5) * 150,
                        vx: (Math.random() > 0.5 ? 1 : -1) * (0.8 + Math.random()),
                        vy: (Math.random() - 0.5) * 0.8,
                        temp: Math.random() > 0.5 ? 'hot' : 'cold' // 冷热粒子
                    });
                }
            } else if (type === 'oasis_ending') {
                // 绿洲星罗密布有向网
                for (let i = 0; i < 30; i++) {
                    animationState.particles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        size: 2 + Math.random() * 3,
                        color: Math.random() > 0.4 ? '#39FF14' : '#FF5E00',
                        opacity: 0.1
                    });
                }
            }
        }

        // 分形树生成算法 (用于计算不可约树状分支)
        function buildFractalTree(x, y, angle, length, depth) {
            if (depth <= 0) return;
            const x2 = x + Math.cos(angle) * length;
            const y2 = y + Math.sin(angle) * length;
            
            animationState.links.push({
                x1: x, y1: y,
                x2: x2, y2: y2,
                depth: depth
            });

            buildFractalTree(x2, y2, angle - 0.35, length * 0.75, depth - 1);
            buildFractalTree(x2, y2, angle + 0.35, length * 0.75, depth - 1);
        }

        // 主画布循环渲染
        function render() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;

            ctx.clearRect(0, 0, w, h);
            animationState.time += 0.05;

            // 统一的轻微底照网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            const gridSz = 40;
            for (let x = 0; x < w; x += gridSz) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }
            for (let y = 0; y < h; y += gridSz) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            // 根据当前场景状态绘制特定几何动画
            const type = animationState.type;

            if (type === 'entropy') {
                // 绘制高熵粒子发散
                animationState.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx = -p.vx;
                    if (p.y < 0 || p.y > h) p.vy = -p.vy;
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                // 绘制随机干扰连线
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                for (let i = 0; i < 20; i++) {
                    const p1 = animationState.particles[i];
                    const p2 = animationState.particles[i + 1];
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            } 
            else if (type === 'ocgs') {
                // 复杂巨系统 - 节点非线性连线
                const pts = animationState.particles;
                pts.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (Math.abs(p.x - cx) > 250) p.vx = -p.vx;

                ];
                edges.forEach(e => {

        // 齿轮绘制辅助算法
        function drawGear(x, y, radius, angle, color, teethNum) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.arc(0, 0, radius - 6, 0, Math.PI * 2);
            ctx.fill();

            // 绘制轮齿
            for (let i = 0; i < teethNum; i++) {
                ctx.rotate(Math.PI * 2 / teethNum);
                ctx.beginPath();
                ctx.moveTo(radius - 6, -5);
                ctx.lineTo(radius + 4, -3);
                ctx.lineTo(radius + 4, 3);
                ctx.lineTo(radius - 6, 5);
                ctx.closePath();
                ctx.fill();
            }

            // 镂空轴心
            ctx.fillStyle = '#050505';
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            ctx.restore();
        }

        // 默认初始化加载第一幕
        loadScene(0);
        render();
    </script>
</body>
</html>
